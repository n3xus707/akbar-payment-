<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKBAR PAYMENT · EL MURBUG</title>
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1b1f2b, #0c0f17 80%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 3D atmosfer & floating background */
        .glass-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(88, 130, 193, 0.15);
            border-radius: 50%;
            filter: blur(90px);
            top: -150px;
            right: -100px;
            z-index: 0;
            animation: floatSphere 16s infinite alternate ease-in-out;
        }

        .glass-sphere-two {
            width: 500px;
            height: 500px;
            background: rgba(162, 89, 255, 0.08);
            border-radius: 50%;
            filter: blur(100px);
            bottom: -200px;
            left: -150px;
            position: absolute;
            animation: floatSphere 20s infinite alternate-reverse;
        }

        @keyframes floatSphere {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* main card — 3D depth dengan banyak layer */
        .payment-card {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            width: 100%;
            background: rgba(18, 22, 33, 0.75);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 50px 80px -20px rgba(0, 0, 0, 0.8),
                        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                        0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 2rem 2.5rem;
            transition: transform 0.25s ease, box-shadow 0.4s;
            animation: cardRise 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .payment-card:hover {
            box-shadow: 0 60px 100px -15px #000000cc, 0 0 0 1px rgba(255, 215, 100, 0.15) inset;
            transform: translateY(-6px) scale(1.002);
        }

        @keyframes cardRise {
            0% { opacity: 0; transform: translateY(60px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* header dengan foto profil (avatar) */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .avatar-3d {
            width: 80px;
            height: 80px;
            border-radius: 30% 70% 70% 30% / 30% 55% 45% 70%; /* organic morph */
            background: linear-gradient(145deg, #2f3e5a, #131a2c);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 40px -10px #00000080, 0 0 0 2px rgba(220, 210, 255, 0.2) inset;
            transition: all 0.3s;
            animation: morphAvatar 6s infinite alternate;
        }

        @keyframes morphAvatar {
            0% { border-radius: 30% 70% 70% 30% / 30% 55% 45% 70%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        .avatar-3d img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
            opacity: 0.95;
            transition: 0.2s;
        }

        .title-glow {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(130deg, #ffffff, #c0ccf0, #a6c1ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(70, 130, 200, 0.7);
            line-height: 1.2;
        }

        .title-glow span {
            font-weight: 300;
            background: linear-gradient(145deg, #9aa8cf, #6f85b5);
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 1.1rem;
            margin-left: 8px;
        }

        /* pembayaran grid - hanya DANA dan QRIS */
        .payment-methods {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin: 2.5rem 0 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .method-card {
            background: rgba(12, 18, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 1.5rem 0.5rem;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.5);
            box-shadow: 0 15px 25px -15px #000000, 0 0 0 1px rgba(255,255,255,0.02) inset;
            cursor: pointer;
            transform-style: preserve-3d;
            transform: perspective(800px) rotateX(0deg) rotateY(0deg) scale(1);
        }

        .method-card:hover {
            transform: perspective(800px) rotateX(2deg) rotateY(4deg) scale(1.05);
            background: rgba(30, 40, 65, 0.8);
            border-color: rgba(220, 200, 255, 0.25);
            box-shadow: 0 30px 40px -15px #000, 0 0 0 1px rgba(200, 180, 255, 0.2) inset;
        }

        .method-icon {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 0.6rem;
            filter: drop-shadow(0 8px 12px #00000050);
        }

        .method-name {
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: -0.01em;
            background: linear-gradient(180deg, #f0f4ff, #bcc7e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .method-desc {
            font-size: 0.85rem;
            color: #96a7cf;
            margin-top: 6px;
            opacity: 0.8;
        }

        /* detail panel dengan efek 3D flip interaktif */
        .detail-panel {
            background: rgba(8, 12, 22, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 2rem 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 40px -20px black, 0 0 0 1px rgba(255,255,255,0.02) inset;
            margin-bottom: 2rem;
            transition: 0.3s;
        }

        .detail-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
            color: #b3c6f0;
            margin-bottom: 1.5rem;
            border-left: 3px solid #4a80e5;
            padding-left: 1rem;
        }

        .ewallet-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem 3rem;
            align-items: center;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .wallet-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 60px;
            padding: 0.6rem 1.8rem 0.6rem 1.2rem;
            border: 1px solid rgba(255,255,240,0.06);
            transition: 0.2s;
            box-shadow: 0 10px 18px -10px #00000080;
        }

        .wallet-item i {
            font-size: 2rem;
            filter: drop-shadow(0 0 6px currentColor);
        }

        .wallet-item span {
            font-size: 1.25rem;
            font-weight: 500;
            color: #dfe9ff;
        }

        .qris-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 36px;
            padding: 1.8rem 2rem;
            border: 1px dashed rgba(180, 200, 255, 0.3);
            margin-top: 1rem;
            align-items: center;
        }

        .qris-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #ecf2ff;
        }

        .qris-image {
            max-width: 250px;
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid #394e75;
            transition: 0.2s;
            cursor: pointer;
        }

        .qris-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .qris-image:hover {
            border-color: #7a9cf0;
            transform: scale(1.02);
        }

        /* contact section - hanya Telegram */
        .contact-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 80px;
            padding: 0.7rem 1.5rem;
            border: 1px solid rgba(200, 220, 255, 0.08);
            margin-top: 1rem;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(25, 35, 60, 0.7);
            border-radius: 40px;
            padding: 0.7rem 1.8rem;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
            color: #ebf0ff;
            font-size: 1.1rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 15px -10px #000;
            text-decoration: none;
        }

        .contact-btn i {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 6px);
        }

        .contact-btn.telegram i { color: #2a9df8; }

        .contact-btn:hover {
            background: #26334d;
            border-color: #5f7bbf;
            transform: scale(1.05) translateY(-2px);
        }

        .footer-note {
            font-size: 0.8rem;
            color: #62749e;
            margin-top: 1.5rem;
            text-align: right;
        }

        /* responsive */
        @media (max-width: 750px) {
            .payment-card { padding: 1.8rem; }
            .payment-methods { grid-template-columns: 1fr 1fr; }
            .profile-header { flex-direction: column; align-items: start; }
        }
    </style>
</head>
<body>
    <div class="glass-sphere"></div>
    <div class="glass-sphere-two"></div>

    <div class="payment-card">
        <!-- header dengan foto profil -->
        <div class="profile-header">
            <div class="avatar-3d">
                <!-- FOTO PROFIL ANDA -->
                <img src="https://files.catbox.moe/p7omqt.jpg" alt="profile">
            </div>
            <div>
                <div class="title-glow">
                    AKBAR PAYMENT
                    <span>·EL MURBUG</span>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 6px; color: #aeb9dc;">
                    <i class="fas fa-bolt" style="color: #f5d742;"></i>
                    <span>cepat · aman · modern</span>
                </div>
            </div>
        </div>

        <!-- pilihan payment: hanya DANA dan QRIS -->
        <div class="payment-methods">
            <div class="method-card" data-method="dana">
                <div class="method-icon"><i class="fas fa-hand-holding-usd" style="color:#2d9cdb;"></i></div>
                <div class="method-name">DANA</div>
                <div class="method-desc">promo spesial</div>
            </div>
            <div class="method-card" data-method="qris">
                <div class="method-icon"><i class="fas fa-qrcode" style="color: #e6b450;"></i></div>
                <div class="method-name">QRIS</div>
                <div class="method-desc">semua app</div>
            </div>
        </div>

        <!-- DETAIL PANEL : DANA & QRIS -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-title">◈ AKTIFKAN PEMBAYARAN</div>

            <!-- Bagian DANA (OVO & Gopay dihilangkan) -->
            <div class="ewallet-grid" id="ewalletContainer">
                <!-- Hanya DANA number -->
                <div class="wallet-item" id="wallet-dana">
                    <i class="fas fa-hand-holding-usd" style="color:#5aa9ff;"></i>
                    <span>0852 1566 9798</span>  <!-- NOMOR DANA ANDA -->
                </div>
            </div>

            <!-- QRIS dengan foto yang diberikan -->
            <div class="qris-area" id="qrisArea">
                <div class="qris-label">
                    <i class="fas fa-qrcode" style="font-size: 2rem; color: #f7c35c;"></i>
                    <span>QRIS · scan langsung</span>
                </div>
                <div class="qris-image" id="qrisImage">
                    <img src="https://files.catbox.moe/4gwvhd.jpg" alt="QRIS Code" style="width: 100%;">
                </div>
                <div style="font-size: 0.9rem; color: #95a9d1;">Scan QRIS di atas untuk pembayaran</div>
            </div>
        </div>

        <!-- CONTACT: hanya Telegram (WhatsApp dihilangkan) -->
        <div class="contact-section">
            <a href="https://t.me/akbarstecuu" class="contact-btn telegram" id="teleLink" target="_blank">
                <i class="fab fa-telegram-plane"></i> Telegram: @akbarstecuu
            </a>
        </div>
        <div class="footer-note">
            <i class="fas fa-lock" style="margin-right: 5px;"></i> transaksi terenkripsi 3D
        </div>
    </div>

    <!-- Interaktif sederhana -->
    <script>
        (function() {
            // Data sudah diisi sesuai permintaan
            
            // Efek highlight method saat diklik
            const methods = document.querySelectorAll('.method-card');
            methods.forEach(m => {
                m.addEventListener('click', function(e) {
                    methods.forEach(c => c.style.borderColor = 'rgba(255,255,255,0.05)');
                    this.style.borderColor = '#7a9cf0';
                    this.style.boxShadow = '0 0 20px #4a70c0';
                    // ganti detail title
                    document.querySelector('.detail-title').innerHTML = `◈ AKTIFKAN PEMBAYARAN • ${this.querySelector('.method-name').innerText}`;
                });
            });

            // efek untuk wallet-item
            document.querySelectorAll('.wallet-item').forEach(w => {
                w.addEventListener('mouseenter', () => {
                    w.style.transform = 'translateX(8px) scale(1.02)';
                    w.style.background = '#1f2d4a';
                });
                w.addEventListener('mouseleave', () => {
                    w.style.transform = 'none';
                    w.style.background = 'rgba(0,0,0,0.25)';
                });
            });
            
            // efek untuk QRIS
            const qrisImg = document.getElementById('qrisImage');
            if(qrisImg) {
                qrisImg.addEventListener('mouseenter', () => {
                    qrisImg.style.transform = 'scale(1.02)';
                    qrisImg.style.transition = '0.2s';
                });
                qrisImg.addEventListener('mouseleave', () => {
                    qrisImg.style.transform = 'scale(1)';
                });
            }
        })();
    </script>
</body>
</html>
